version: '3.8'

# ======================================
# Common Airflow Configuration
# ======================================
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.1
  # We create a specific anchor just for the environment block
  environment: &airflow-common-env
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
    - _AIRFLOW_WWW_USER_CREATE=true
    - _AIRFLOW_WWW_USER_USERNAME=airflow
    - _AIRFLOW_WWW_USER_PASSWORD=airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    # Project-specific mounts for LedgerSync [cite: 1, 21]
    - ../processing:/opt/airflow/processing
    - ../dbt_ledger_sync:/opt/airflow/dbt_ledger_sync
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ======================================
  # Metadata Database (PostgreSQL)
  # ======================================
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ======================================
  # Airflow Database Initialization
  # ======================================
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      # Now we reference the valid anchor we created above
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
    depends_on:
      postgres:
        condition: service_healthy

  # ======================================
  # Airflow Webserver (UI)
  # ======================================
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ======================================
  # Airflow Scheduler
  # ======================================
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume: